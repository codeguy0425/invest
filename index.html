<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bull Put Spread Analyzer (Live)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #ea580c;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--card);
            box-sizing: border-box;
            padding: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        header {
            flex-shrink: 0;
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            text-align: center;
            position: relative;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        header p { color: #64748b; margin: 2px 0 0 0; font-size: 0.75rem; }

        .header-actions {
            position: absolute;
            right: 0;
            top: 2px;
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .icon-btn:hover { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
        .icon-btn svg { width: 18px; height: 18px; }

        #inputContainer {
            flex-shrink: 0;
            transition: all 0.3s ease;
            overflow: hidden;
            max-height: 1000px;
            opacity: 1;
            margin-bottom: 10px;
        }

        #inputContainer.collapsed {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .api-section {
            grid-column: span 2;
            padding: 10px;
            background: #eff6ff;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            margin-bottom: 8px;
        }

        .input-item { display: flex; flex-direction: column; }
        .input-item.full-width { grid-column: span 2; }

        label { font-size: 0.65rem; font-weight: 600; margin-bottom: 2px; color: #64748b; }
        input {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-calc {
            grid-column: span 2;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn-live {
            background: #1e293b;
            color: white;
            font-size: 0.7rem;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chart-section {
            flex-shrink: 0;
            height: 200px;
            margin-bottom: 10px;
        }

        .slider-section {
            flex-shrink: 0;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .slider-container { width: 100%; margin: 4px 0; }
        input[type="range"] {
            width: 100%;
            height: 8px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .status-display { font-size: 0.8rem; text-align: center; padding: 4px; }

        .info-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .stat-card {
            padding: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card small { color: #64748b; font-size: 0.6rem; text-transform: uppercase; display: block; }
        .stat-card div { font-size: 0.85rem; font-weight: 700; }

        .table-container {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: #f8fafc; padding: 8px; color: #64748b; border-bottom: 1px solid #e2e8f0; text-align: left; }
        td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }
        
        .active-row { background: #f0fdf4; border-left: 4px solid var(--success); }
        .row-hidden { display: none; }

        .table-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-header-flex span { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.6rem; }
        .badge-profit { background: #dcfce7; color: #166534; }
        .badge-loss { background: #fee2e2; color: #991b1b; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; font-weight: bold; color: var(--primary);
        }

        @media (min-width: 640px) {
            .input-grid { grid-template-columns: repeat(4, 1fr); }
            .btn-calc { grid-column: span 4; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .chart-section { height: 260px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">正在獲取市場數據...</div>

<div class="app-container">
    <header>
        <h1>Bull Put Spread Live Analyzer</h1>
        <p>標的：<span id="displaySymbol">DRAM</span> | 現價: <span id="currentStockPrice">--</span></p>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleInputs()" id="toggleBtn" title="參數設置">
                <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 15.75 7.5-7.5 7.5 7.5" />
                </svg>
            </button>
        </div>
    </header>

    <div id="inputContainer">
        <div class="input-grid">
            <div class="api-section">
                <label>Alpha Vantage API Key (取得動態價格)</label>
                <div style="display: flex; gap: 4px;">
                    <input type="password" id="apiKey" placeholder="在此輸入您的 API Key" style="flex:1">
                    <button class="btn-live" onclick="fetchLiveData()" style="margin-top:0">
                        ⚡ 獲取市價
                    </button>
                </div>
                <small style="color: #64748b; display: block; margin-top: 4px;">獲取即時股票現價及期權權利金估計。</small>
            </div>
            
            <div class="input-item">
                <label>股票代碼</label>
                <input type="text" id="symbol" value="AAPL">
            </div>
            <div class="input-item">
                <label>手動市價</label>
                <input type="number" id="manualPrice" step="0.01" value="230.50">
            </div>
            <div class="input-item">
                <label>賣出 Put (高)</label>
                <input type="number" id="highStrike" value="225">
            </div>
            <div class="input-item">
                <label>買入 Put (低)</label>
                <input type="number" id="lowStrike" value="220">
            </div>
            <div class="input-item">
                <label>賣出權利金</label>
                <input type="number" id="shortPremium" step="0.01" value="4.50">
            </div>
            <div class="input-item">
                <label>買入權利金</label>
                <input type="number" id="longPremium" step="0.01" value="2.20">
            </div>
            <div class="input-item full-width">
                <label>合約乘數</label>
                <input type="number" id="multiplier" value="100">
            </div>
            <button class="btn-calc" onclick="updateDashboard(); autoCollapse();">計算模擬損益</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-section">
            <canvas id="pnlChart"></canvas>
        </div>

        <div class="slider-section">
            <div class="slider-container">
                <input type="range" id="priceSlider" step="0.1" oninput="handleSliderChange(this.value)">
            </div>
            <div id="priceInfo" class="status-display"></div>
        </div>

        <div class="info-section">
            <div class="stats-grid">
                <div class="stat-card"><small>最大利潤</small><div id="resProfit" style="color:var(--success)">$0</div></div>
                <div class="stat-card"><small>最大風險</small><div id="resLoss" style="color:var(--danger)">$0</div></div>
                <div class="stat-card"><small>平衡點</small><div id="resBreakeven" style="color:var(--primary)">$0</div></div>
                <div class="stat-card"><small>資金報酬率</small><div id="resROI" style="color:var(--primary)">0%</div></div>
            </div>

            <div class="table-container">
                <div class="table-header-flex">
                    <span>當前情境分析</span>
                    <button class="icon-btn" style="padding: 2px 4px; border-radius: 4px;" onclick="toggleFullMatrix()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px; height:14px;">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                    </button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 30%">價格區間</th>
                            <th>情境說明</th>
                            <th style="width: 20%">損益</th>
                        </tr>
                    </thead>
                    <tbody id="outcomeMatrix"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;
    let currentParams = {};
    let showAllScenarios = false;

    async function fetchLiveData() {
        const apiKey = document.getElementById('apiKey').value;
        const symbol = document.getElementById('symbol').value;
        if (!apiKey) {
            alertMsg("請先輸入 API Key");
            return;
        }

        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';

        try {
            // 1. Fetch Stock Price
            const stockUrl = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${apiKey}`;
            const stockRes = await fetch(stockUrl);
            const stockData = await stockRes.json();
            
            if (stockData["Global Quote"] && stockData["Global Quote"]["05. price"]) {
                const price = parseFloat(stockData["Global Quote"]["05. price"]);
                document.getElementById('manualPrice').value = price.toFixed(2);
                document.getElementById('currentStockPrice').innerText = `$${price.toFixed(2)}`;
            }

            alertMsg("股票價格已更新！請確認執行價。");
            updateDashboard();
        } catch (e) {
            alertMsg("獲取數據失敗，請檢查 Key 或網路。");
        } finally {
            overlay.style.display = 'none';
        }
    }

    function alertMsg(msg) {
        const div = document.createElement('div');
        div.style = "position:fixed; top:20px; background:var(--primary); color:white; padding:10px 20px; border-radius:8px; z-index:2000; box-shadow:0 4px 10px rgba(0,0,0,0.2)";
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function toggleInputs() {
        const container = document.getElementById('inputContainer');
        const icon = document.getElementById('toggleIcon');
        const isCollapsed = container.classList.toggle('collapsed');
        icon.style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function toggleFullMatrix() {
        showAllScenarios = !showAllScenarios;
        handleSliderChange(document.getElementById('priceSlider').value);
    }

    function autoCollapse() {
        const container = document.getElementById('inputContainer');
        if (!container.classList.contains('collapsed')) toggleInputs();
    }

    function calculatePnL(price, highS, lowS, netCredit, mult) {
        let pnlPerShare = 0;
        if (price >= highS) pnlPerShare = netCredit;
        else if (price <= lowS) pnlPerShare = netCredit - (highS - lowS);
        else pnlPerShare = netCredit - (highS - price);
        return pnlPerShare * mult;
    }

    function updateDashboard() {
        const symbol = document.getElementById('symbol').value;
        const highS = parseFloat(document.getElementById('highStrike').value);
        const lowS = parseFloat(document.getElementById('lowStrike').value);
        const shortP = parseFloat(document.getElementById('shortPremium').value);
        const longP = parseFloat(document.getElementById('longPremium').value);
        const mult = parseFloat(document.getElementById('multiplier').value);
        const initialPrice = parseFloat(document.getElementById('manualPrice').value);

        document.getElementById('displaySymbol').innerText = symbol;
        const netCredit = shortP - longP;
        currentParams = { highS, lowS, netCredit, mult };

        const maxProfit = netCredit * mult;
        const maxLoss = ((highS - lowS) - netCredit) * mult;
        const breakeven = highS - netCredit;
        
        document.getElementById('resProfit').innerText = `$${maxProfit.toLocaleString()}`;
        document.getElementById('resLoss').innerText = `-$${maxLoss.toLocaleString()}`;
        document.getElementById('resBreakeven').innerText = `$${breakeven.toFixed(2)}`;
        document.getElementById('resROI').innerText = `${(maxProfit/maxLoss*100).toFixed(1)}%`;

        const slider = document.getElementById('priceSlider');
        slider.min = Math.floor(lowS - (highS - lowS));
        slider.max = Math.ceil(highS + (highS - lowS));
        slider.value = initialPrice;

        renderStaticTable(highS, lowS, netCredit, mult, breakeven);
        initChart(highS, lowS, netCredit, mult);
        handleSliderChange(initialPrice);
    }

    function renderStaticTable(highS, lowS, netCredit, mult, breakeven) {
        const matrix = [
            { id: 'profit', range: `≥ $${highS}`, desc: "價外結算，保留全部權利金" },
            { id: 'partialProfit', range: `$${breakeven.toFixed(2)} ~ $${highS}`, desc: "微幅進入價內，仍有盈餘" },
            { id: 'partialLoss', range: `$${lowS} ~ $${breakeven.toFixed(2)}`, desc: "虧損區域，未觸及低位保護" },
            { id: 'maxLoss', range: `≤ $${lowS}`, desc: "跌破保護，最大風險鎖定" }
        ];

        let html = "";
        matrix.forEach(m => {
            const isProfit = m.id.toLowerCase().includes('profit');
            html += `<tr id="row-${m.id}" class="scenario-row">
                <td><strong>${m.range}</strong></td>
                <td>${m.desc}</td>
                <td><span class="badge ${isProfit ? 'badge-profit' : 'badge-loss'}">${isProfit ? '盈利' : '虧損'}</span></td>
            </tr>`;
        });
        document.getElementById('outcomeMatrix').innerHTML = html;
    }

    function handleSliderChange(val) {
        const pnl = calculatePnL(parseFloat(val), currentParams.highS, currentParams.lowS, currentParams.netCredit, currentParams.mult);
        
        const color = pnl >= 0 ? 'var(--success)' : 'var(--danger)';
        const prefix = pnl >= 0 ? '+' : '';
        document.getElementById('priceInfo').innerHTML = `模擬價格: <strong>$${parseFloat(val).toFixed(2)}</strong> | 損益: <strong style="color:${color}">${prefix}$${pnl.toLocaleString(undefined, {minimumFractionDigits: 2})}</strong>`;
        
        if (chartInstance) {
            chartInstance.activePrice = parseFloat(val);
            chartInstance.draw();
        }

        const { highS, lowS, netCredit } = currentParams;
        const breakeven = highS - netCredit;
        let activeId = "";
        if (val >= highS) activeId = 'row-profit';
        else if (val >= breakeven) activeId = 'row-partialProfit';
        else if (val >= lowS) activeId = 'row-partialLoss';
        else activeId = 'row-maxLoss';

        document.querySelectorAll('.scenario-row').forEach(r => {
            r.classList.remove('active-row');
            if (showAllScenarios) {
                r.classList.remove('row-hidden');
                if (r.id === activeId) r.classList.add('active-row');
            } else {
                if (r.id === activeId) {
                    r.classList.remove('row-hidden');
                    r.classList.add('active-row');
                } else {
                    r.classList.add('row-hidden');
                }
            }
        });
    }

    function initChart(highS, lowS, netCredit, mult) {
        const ctx = document.getElementById('pnlChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const labels = [];
        const pnlData = [];
        const range = highS - lowS;
        const minX = lowS - range;
        const maxX = highS + range;
        
        for (let i = 0; i <= 60; i++) {
            const p = minX + (i * (maxX - minX) / 60);
            labels.push(p);
            pnlData.push(calculatePnL(p, highS, lowS, netCredit, mult));
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: pnlData,
                    fill: { target: 'origin', above: 'rgba(22, 163, 74, 0.05)', below: 'rgba(220, 38, 38, 0.05)' },
                    borderColor: '#2563eb',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0,
                    segment: { borderColor: c => c.p0.parsed.y < 0 ? '#dc2626' : '#16a34a' }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { type: 'linear', grid: { display: false } },
                    y: { grid: { color: '#f1f5f9' } }
                }
            },
            plugins: [{
                id: 'cross',
                afterDraw: (chart) => {
                    if (chart.activePrice) {
                        const { ctx, chartArea, scales } = chart;
                        const x = scales.x.getPixelForValue(chart.activePrice);
                        ctx.save();
                        ctx.beginPath();
                        ctx.setLineDash([5, 5]);
                        ctx.strokeStyle = '#2563eb';
                        ctx.moveTo(x, chartArea.top);
                        ctx.lineTo(x, chartArea.bottom);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }]
        });
    }

    window.onload = updateDashboard;
</script>
</body>
</html>
